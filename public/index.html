<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amamiya 3D Avatar</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #b4befe; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        #ui-layer { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); text-align: center; background: rgba(0,0,0,0.7); color: white; padding: 15px 30px; border-radius: 15px; width: 80%; max-width: 600px; display: none; }
        #status { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.5); color: #a6e3a1; padding: 5px 10px; border-radius: 5px; font-weight: bold; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
                "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js"
            }
        }
    </script>
</head>
<body>
    <div id="status">🔴 Menghubungkan...</div>
    <div id="ui-layer">
        <h3 id="teks-ai" style="margin: 0;"></h3>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
        import { io } from "https://cdn.socket.io/4.7.2/socket.io.esm.min.js";

        // --- 1. SETUP THREE.JS (Scene, Camera, Renderer) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 20);
        camera.position.set(0, 1.4, 2.5); // Fokus ke wajah/pundak avatar

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Pencahayaan
        const light = new THREE.DirectionalLight(0xffffff, 1.0);
        light.position.set(1, 1, 1).normalize();
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // --- 2. LOAD MODEL VRM ---
        let currentVrm = null;
        const loader = new GLTFLoader();
        loader.register((parser) => new VRMLoaderPlugin(parser));

        // PASTIKAN NAMA FILE DI BAWAH INI SESUAI DENGAN FILE KAMU DI FOLDER PUBLIC
        loader.load('/avatar.vrm', (gltf) => {
            const vrm = gltf.userData.vrm;
            VRMUtils.removeUnnecessaryJoints(gltf.scene);
            scene.add(vrm.scene);
            currentVrm = vrm;

            // Rotasi agar avatar menghadap depan
            vrm.scene.rotation.y = Math.PI;
            console.log('✅ Model VRM berhasil dimuat!');
        }, undefined, (error) => console.error(error));

        // --- 3. ANIMATION LOOP ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const deltaTime = clock.getDelta();
            if (currentVrm) {
                currentVrm.update(deltaTime);
                // Efek nafas pelan
                currentVrm.scene.position.y = Math.sin(clock.elapsedTime) * 0.01;
            }
            renderer.render(scene, camera);
        }
        animate();

        // Handle Resize Layar
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 4. SOCKET.IO (JEMBATAN KE DISCORD BOT) ---
        // Koneksi ke port yang sama dengan web server (7676 sesuai docker-compose mu)
        const socket = io();
        const statusEl = document.getElementById('status');
        const uiLayer = document.getElementById('ui-layer');
        const teksEl = document.getElementById('teks-ai');
        let expressionTimeout;

        socket.on('connect', () => {
            statusEl.innerText = '🟢 Sinyal Discord Terhubung';
            statusEl.style.color = '#a6e3a1';
        });

        socket.on('disconnect', () => {
            statusEl.innerText = '🔴 Sinyal Terputus';
            statusEl.style.color = '#f38ba8';
        });

        // MENERIMA PERINTAH DARI DISCORD
        socket.on('ai_speak', (data) => {
            console.log("Sinyal masuk:", data);
            
            // Tampilkan teks subtitle
            teksEl.innerText = `"${data.teks}"`;
            uiLayer.style.display = 'block';

            // Ganti ekspresi VRM
            if (currentVrm && currentVrm.expressionManager) {
                // Reset semua ekspresi ke nol dulu
                currentVrm.expressionManager.setValue('happy', 0);
                currentVrm.expressionManager.setValue('angry', 0);
                currentVrm.expressionManager.setValue('sad', 0);
                currentVrm.expressionManager.setValue('surprised', 0);
                currentVrm.expressionManager.setValue('neutral', 0);

                // Set ekspresi sesuai perintah dari Discord
                currentVrm.expressionManager.setValue(data.emosi.toLowerCase(), 1.0);

                // Kembalikan ke netral setelah 4 detik (simulasi selesai bicara)
                clearTimeout(expressionTimeout);
                expressionTimeout = setTimeout(() => {
                    currentVrm.expressionManager.setValue(data.emosi.toLowerCase(), 0);
                    currentVrm.expressionManager.setValue('neutral', 1.0);
                    uiLayer.style.display = 'none';
                }, 4000);
            }
        });
    </script>
</body>
</html>
