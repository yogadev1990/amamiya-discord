<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waguri 3D Avatar - Modular</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1e1e2e; font-family: sans-serif; }
        #canvas-container { width: 100vw; height: 100vh; display: block; }
        
        #ui-layer { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); 
            text-align: center; background: rgba(17, 17, 27, 0.8); color: #cdd6f4; 
            padding: 15px 30px; border-radius: 15px; width: 80%; max-width: 700px; 
            display: none; font-size: 1.2rem; line-height: 1.5; 
            border: 2px solid #cba6f7; box-shadow: 0 4px 15px rgba(203, 166, 247, 0.3); 
        }

        #status { 
            position: absolute; top: 15px; left: 15px; background: rgba(17, 17, 27, 0.8); 
            color: #a6e3a1; padding: 8px 15px; border-radius: 8px; font-weight: bold; 
            border: 1px solid #a6e3a1; 
        }
        
        #start-screen { 
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(30, 30, 46, 0.95); color: #cba6f7; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; 
            z-index: 100; cursor: pointer; 
        }
        #start-screen h1 { font-size: 2.5rem; margin-bottom: 10px; }
        #start-screen p { font-size: 1.2rem; color: #a6adc8; }
        #slide-container {
    position: absolute;
    top: 30px;    /* Mengunci ke atas dengan jarak 30px */
    right: 30px;  /* Mengunci ke kanan dengan jarak 30px */
    width: 350px; /* Sedikit diperkecil (dari 400px) agar lebih rapi di sudut */
    max-height: 60vh;
    background: rgba(30, 30, 46, 0.85);
    border: 2px solid #a6e3a1;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(166, 227, 161, 0.4);
    display: none; 
    flex-direction: column;
    overflow: hidden;
    z-index: 50; /* Pastikan selalu berada di atas layer lain */
    transition: opacity 0.5s ease-in-out;
}

#slide-container img {
    width: 100%;
    height: auto;
    object-fit: contain;
    border-bottom: 1px solid #45475a;
}

#slide-label {
    padding: 10px;
    text-align: center;
    color: #a1b3e3;
    font-weight: bold;
    font-size: 1rem;
    background: rgba(17, 17, 27, 0.9);
}
    </style>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
            "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.5.0/lib/three-vrm.module.js",
            "@pixiv/three-vrm-animation": "https://unpkg.com/@pixiv/three-vrm-animation@3.5.0/lib/three-vrm-animation.module.js"
        }
    }
</script>
</head>
<body>

    <div id="start-screen">
        <h1>🎙️ Waguri AI VTuber</h1>
        <p>Klik layar untuk membangunkan avatar</p>
    </div>

    <div id="status" style="display: none;">🔴 Menghubungkan...</div>
    <div id="slide-container">
            <img id="slide-image" src="" alt="Materi Medis">
            <div id="slide-label">📚 Lampiran Materi</div>
        </div>
    <div id="ui-layer">
        <h3 id="teks-ai" style="margin: 0;"></h3>
    </div>

    <script type="module" src="./src/main.js"></script>

</body>
</html>
